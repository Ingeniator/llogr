services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  createbucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/llogr-raw-events;
      "

  llogr:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      createbucket:
        condition: service_completed_successfully
    environment:
      LLOGR_S3_ENDPOINT: http://minio:9000
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro

  seed:
    build: .
    depends_on:
      llogr:
        condition: service_started
    entrypoint: ["python", "-m", "scripts.seed"]
    environment:
      PYTHONPATH: /app
      LLOGR_URL: http://llogr:8000
    volumes:
      - ./scripts:/app/scripts:ro
    profiles:
      - seed
