replicaCount: 1

image:
  repository: llogr
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llogr.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

config:
  s3:
    bucket: llogr-raw-events
    region: us-east-1
    endpoint: ""
    access_key_id: ""
    secret_access_key: ""
  clickbeat:
    api_url: ""
    api_key: ""

# Reference an existing secret instead of putting creds in values.
# Secret must have keys: s3-access-key-id, s3-secret-access-key, clickbeat-api-key
existingSecret: ""
