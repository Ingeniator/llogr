s3:
  bucket: "llogr-raw-events"
  region: "us-east-1"
  endpoint: "http://minio:9000"
  public_endpoint: "http://localhost:8888/s3"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  addressing_style: "path"
  cors_origins:
  - "*"
clickstream:
  api_url: "http://clickstream:9999/2/httpapi"
  api_key: "clickstream-key"
server:
  root_path: "/llogr"
  hide_auth_inputs: true
  workers: 4
features:
  store_backends:
  - s3
  - clickhouse
  - clickstream
  search_enabled: true
  search_backend: "clickhouse"
clickhouse:
  url: "http://clickhouse:8123"
  database: "default"
  table: "llogr_events"
  user: "default"
  password: "clickhouse"
