s3:
  bucket: "llogr-raw-events"
  region: "us-east-1"
  endpoint: "http://minio:9000"
  public_endpoint: "http://localhost:8888/s3"
  access_key_id: "minioadmin"
  secret_access_key: "minioadmin"
  addressing_style: "path"
  cors_origins:
  - "*"
clickstream:
  # Fan out to multiple Amplitude-compatible endpoints — add more entries to send events to several targets.
- name: "primary"
  api_url: "http://clickstream:9999/2/httpapi"
  api_key: "clickstream-key"
server:
  root_path: "/llogr"
  hide_auth_inputs: true
  workers: 4
features:
  store_backends:
  - s3
  - clickhouse
  - clickstream
  - tempo
  search_enabled: true
  search_backend: "clickhouse"
  agent_whitelist:
  - "research-assistant"
  forward:
  - url: "http://langfuse-web:3000"
    pass_auth: false
    public_key: "lf-pk-ai-suite"
    secret_key: "lf-sk-ai-suite"
    timeout: 10
  langfuse_ui_url: "http://localhost:3031"
clickhouse:
  url: "http://clickhouse:8123"
  database: "default"
  table: "llogr_events"
  user: "default"
  password: "clickhouse"
tempo:
  endpoint: "http://tempo:4318/v1/traces"
  service_name: "llogr"
